<!DOCTYPE html>
<html>
<head>
    <title>Urgent Fix - Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 48px; margin: 0 0 20px 0; }
        p { font-size: 20px; margin: 10px 0; }
        .spinner {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: #ec5b13;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
        }
        .btn:hover { background: #d94a0a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Fixing Stays Listings</h1>
        <div class="spinner"></div>
        <p>Redirecting to fix script...</p>
        <p id="countdown">Redirecting in 2 seconds...</p>
        <a href="fix-stays-now.php" class="btn">Click Here if Not Redirected</a>
    </div>
    
    <script>
        let count = 2;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            count--;
            countdownEl.textContent = `Redirecting in ${count} second${count !== 1 ? 's' : ''}...`;
            
            if (count <= 0) {
                clearInterval(interval);
                window.location.href = 'fix-stays-now.php';
            }
        }, 1000);
    </script>
</body>
</html>
